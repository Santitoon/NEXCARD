<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NEXCARD — Perfil Expo</title>

  <style>
    :root{
      /* === NEXCARD vibe === */
      --navy:#061A2D;
      --navy2:#0A2A4A;
      --navy3:#0F3B6A;
      --accent:#21A1FF;
      --accent2:#63D3FF;

      --bg0:#F7FBFF;
      --bg1:#EEF4FF;

      --text:#0B1B33;
      --muted:#5A6A83;

      --glass: rgba(255,255,255,.70);
      --border: rgba(6,26,45,.12);
      --shadow: 0 30px 90px rgba(0,0,0,.14);

      --r-xl: 28px;
      --r-lg: 20px;

      --ease: cubic-bezier(.22,1,.36,1);
    }

    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial;
      min-height:100vh;
      color:var(--text);
      background:
        radial-gradient(900px 520px at 12% 10%, rgba(33,161,255,.16), transparent 58%),
        radial-gradient(820px 560px at 90% 22%, rgba(99,211,255,.14), transparent 60%),
        radial-gradient(900px 600px at 50% 110%, rgba(15,59,106,.10), transparent 60%),
        linear-gradient(180deg, #fff, var(--bg1));
      display:flex;
      justify-content:center;
      overflow-x:hidden;
    }

    /* subtle grid */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(to right, rgba(6,26,45,.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(6,26,45,.05) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at 30% 20%, rgba(0,0,0,.9), rgba(0,0,0,.18) 55%, transparent 72%);
      opacity:.30;
      z-index:0;
    }

    .wrap{
      width:min(560px, 92vw);
      padding:24px 0 44px;
      position:relative;
      z-index:1;
    }

    .card{
      background: var(--glass);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .top{
      background:
        radial-gradient(900px 260px at 10% 0%, rgba(33,161,255,.28), transparent 60%),
        linear-gradient(135deg, var(--navy) 0%, var(--navy2) 55%, var(--navy3) 100%);
      padding: 26px 18px 20px;
      text-align:center;
      color:#fff;
      position:relative;
    }

    .brand{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-bottom:12px;
    }

    .brandMark{
      width:46px;height:46px;
      border-radius:14px;
      background: rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.18);
      box-shadow: 0 14px 40px rgba(0,0,0,.25);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .brandMark img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .brandText{
      text-align:left;
      line-height:1.05;
    }
    .brandText b{
      display:block;
      font-weight:900;
      letter-spacing:.05em;
    }
    .brandText span{
      display:block;
      font-size:12px;
      opacity:.85;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    .profileName{
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-top:8px;
    }

    .profileRole{
      margin-top:6px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(255,255,255,.88);
    }

    .content{
      padding: 22px 24px 16px;
      text-align:center;
    }

    .desc{
      font-size: 14px;
      color: var(--muted);
      line-height: 1.55;
    }

    .ctaWrap{
      padding: 0 24px 22px;
    }

    .cta{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding: 16px;
      border-radius: 18px;
      text-decoration:none;
      font-weight: 900;
      letter-spacing:.06em;
      text-transform:uppercase;
      color:#fff;
      background:
        radial-gradient(180px 120px at 25% 20%, rgba(99,211,255,.55), transparent 60%),
        linear-gradient(135deg, var(--accent) 0%, #2a7cff 55%, var(--navy3) 120%);
      box-shadow: 0 18px 55px rgba(33,161,255,.30);
      transition: transform .18s var(--ease);
    }
    .cta:hover{ transform: translateY(-2px); }

    .note{
      margin-top:10px;
      font-size:12px;
      color: var(--muted);
      text-align:center;
    }

    .links{
      display:grid;
      gap:12px;
      padding: 14px 16px 16px;
    }

    .link{
      display:flex;
      align-items:center;
      gap:14px;
      padding: 16px;
      border-radius: var(--r-lg);
      background: rgba(255,255,255,.80);
      border: 1px solid rgba(6,26,45,.08);
      box-shadow: 0 12px 30px rgba(0,0,0,.08);
      text-decoration:none;
      color: var(--text);
      transition: transform .18s var(--ease);
    }
    .link:hover{ transform: translateY(-3px); }

    .icon{
      width:46px;
      height:46px;
      border-radius: 14px;
      overflow:hidden;
      flex:0 0 46px;
      display:flex;
      align-items:center;
      justify-content:center;
      background: rgba(6,26,45,.04);
      border: 1px solid rgba(6,26,45,.06);
    }
    .icon img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .text b{ display:block; font-size:15px; }
    .text span{ display:block; font-size:13px; color: var(--muted); margin-top:2px; }

    .arrow{
      margin-left:auto;
      opacity:.45;
      font-size:18px;
      font-weight:900;
    }

    .footerTiny{
      text-align:center;
      padding: 10px 16px 18px;
      color: rgba(90,106,131,.85);
      font-size: 11.5px;
    }
  </style>
</head>
